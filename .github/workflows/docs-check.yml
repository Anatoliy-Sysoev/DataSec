name: docs-check

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  markdown-and-diagrams:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz plantuml
          npm install -g @mermaid-js/mermaid-cli

      - name: Render PlantUML diagrams
        run: |
          mkdir -p images/plantuml
          plantuml -tpng -o ../images/plantuml plantuml/*.puml

      - name: Render Mermaid diagrams
        run: |
          mkdir -p images/mermaid
          for file in mermaid/*.mmd; do
            name=$(basename "$file" .mmd)
            mmdc -i "$file" -o "images/mermaid/${name}.png"
          done

      - name: Check Markdown files exist
        run: |
          test -f README.md
          test -f docs/problem-statement.md
          test -f docs/as-is.md
          test -f docs/to-be.md
          test -f docs/architecture-decisions.md
          test -f docs/idm-integration.md
          test -f keycloak/README.md
          test -f ldap/bootstrap.ldif

      - name: Upload rendered diagrams
        uses: actions/upload-artifact@v4
        with:
          name: rendered-diagrams
          path: images/
          if-no-files-found: error
