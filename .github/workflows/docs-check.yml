name: docs-check

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  markdown-and-diagrams:
    runs-on: ubuntu-latest
    env:
      # Официальный PlantUML jar. Apt-версия на ubuntu-latest устарела и
      # не поддерживает используемые директивы (!theme plain и пр.).
      PLANTUML_VERSION: "1.2024.7"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz
          npm install -g @mermaid-js/mermaid-cli
          curl -sSL -o "$RUNNER_TEMP/plantuml.jar" \
            "https://github.com/plantuml/plantuml/releases/download/v${PLANTUML_VERSION}/plantuml-${PLANTUML_VERSION}.jar"

      - name: Render PlantUML diagrams
        run: |
          mkdir -p images/plantuml
          java -jar "$RUNNER_TEMP/plantuml.jar" -tpng -o ../images/plantuml plantuml/*.puml

      - name: Render Mermaid diagrams
        run: |
          mkdir -p images/mermaid
          for file in mermaid/*.mmd; do
            name=$(basename "$file" .mmd)
            mmdc -i "$file" -o "images/mermaid/${name}.png"
          done

      - name: Check Markdown files exist
        run: |
          test -f README.md
          test -f docs/problem-statement.md
          test -f docs/as-is.md
          test -f docs/to-be.md
          test -f docs/architecture-decisions.md
          test -f docs/idm-integration.md
          test -f keycloak/README.md
          test -f ldap/bootstrap.ldif

      - name: Upload rendered diagrams
        uses: actions/upload-artifact@v4
        with:
          name: rendered-diagrams
          path: images/
          if-no-files-found: error
